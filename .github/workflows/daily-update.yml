name: Daily Repository Update

permissions:
  contents: write

on:
  schedule:
    - cron: '20 7 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: 24f3000956@ds.study.iitm.ac.in
        run: |
          echo "Workflow triggered on $(date)" >> daily-log.txt

      - name: Commit and Push
        run: |
          git config user.name "Rohit Mal"
          git config user.email "24f3000956@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Automated daily update: $(date)" || echo "No changes to commit"
          git push
